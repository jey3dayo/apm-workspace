    - --browserUrl
    - http://127.0.0.1:9222
    registry: false
    command: npx
  codex:
    name: codex
    transport: stdio
    args:
    - mcp-server
    registry: false
    command: codex
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@latest'
    registry: false
    command: npx
  jina-reader:
    name: jina-reader
    transport: stdio
    args:
    - -y
    - mcp-remote
    - https://mcp.jina.ai/v1?include_tags=read
    - --header
    - 'Authorization: Bearer ${JINA_API_KEY}'
    registry: false
    command: npx
  mcp-simple-voicevox:
    name: mcp-simple-voicevox
    transport: stdio
    args:
    - -y
    - '@t09tanaka/mcp-simple-voicevox'
    registry: false
    command: npx
  peekaboo:
    name: peekaboo
    transport: stdio
    args:
    - -y
    - '@steipete/peekaboo'
    - mcp
    registry: false
