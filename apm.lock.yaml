mcp_servers:
- chrome-devtools
- context7
- mcp-simple-voicevox
- peekaboo
- tauri-mcp-server
- ultracite
mcp_configs:
  chrome-devtools:
    name: chrome-devtools
    transport: stdio
    args:
    - -y
    - chrome-devtools-mcp@latest
    - --browserUrl
    - http://127.0.0.1:9222
    registry: false
    command: npx
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@latest'
    registry: false
    command: npx
  mcp-simple-voicevox:
    name: mcp-simple-voicevox
    transport: stdio
    args:
    - -y
    - '@t09tanaka/mcp-simple-voicevox'
    registry: false
    command: npx
  peekaboo:
    name: peekaboo
    transport: stdio
    args:
    - -y
    - '@steipete/peekaboo'
    - mcp
    registry: false
    command: npx
  tauri-mcp-server:
    name: tauri-mcp-server
    transport: stdio
    args:
    - -y
    - '@hypothesi/tauri-mcp-server'
    registry: false
    command: npx
  ultracite:
    name: ultracite
    transport: stdio
    args:
    - -y
    - mcp-remote
    - https://docs.ultracite.ai/mcp
    registry: false
    command: npx
