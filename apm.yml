    - openai/skills/skills/.curated/gh-fix-ci
    - tokoroten/prompt-review/.claude/skills/prompt-review
    - trailofbits/skills/plugins/audit-context-building/skills/audit-context-building
    - trailofbits/skills/plugins/static-analysis/skills/codeql
    - trailofbits/skills/plugins/static-analysis/skills/semgrep
    - trailofbits/skills/plugins/supply-chain-risk-auditor/skills/supply-chain-risk-auditor
    - SawyerHood/dev-browser/skills/dev-browser
    - browser-use/browser-harness
    - vercel-labs/agent-browser/skills/agent-browser
    - vercel-labs/agent-skills/skills/composition-patterns
    - vercel-labs/agent-skills/skills/react-best-practices
    - vercel-labs/agent-skills/skills/web-design-guidelines
    - vercel-labs/skills/skills/find-skills
    - apollographql/skills/skills/rust-best-practices
    - gonta223/humanizer-ja
    - softaworks/agent-toolkit/skills/humanizer
  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@upstash/context7-mcp@latest"
    - name: chrome-devtools
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - chrome-devtools-mcp@latest
        - --browserUrl
        - http://127.0.0.1:9222
    - name: ultracite
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - mcp-remote
        - https://docs.ultracite.ai/mcp
    - name: mcp-simple-voicevox
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@t09tanaka/mcp-simple-voicevox"
    - name: tauri-mcp-server
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@hypothesi/tauri-mcp-server"
    - name: peekaboo
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@steipete/peekaboo"
        - mcp
scripts: {}
