  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@upstash/context7-mcp@latest"
    - name: mcp-simple-voicevox
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@t09tanaka/mcp-simple-voicevox"
    - name: jina-reader
      registry: false
      transport: streamable-http
      url: https://mcp.jina.ai/v1?include_tags=search,read
      headers:
        Authorization: Bearer ${JINA_API_KEY}
    - name: codex
      registry: false
      transport: stdio
      command: codex
      args:
        - mcp-server
    - name: 1password
      registry: false
      transport: stdio
      command: /Applications/1Password.app/Contents/MacOS/onepassword-mcp
    - name: headroom
      registry: false
      transport: stdio
      command: headroom
      args:
        - mcp
        - serve
scripts: {}
