name: apm-workspace
version: 1.0.0
description: APM project for apm-workspace
author: jey3dayo
targets:
  - claude
  - codex
  - cursor
  - opencode
  - agent-skills
dependencies:
  apm:
    - jey3dayo/apm-workspace/catalog#main
    - jey3dayo/apm-workspace/manual-skills#main
    - caad-develop/claude-code-marketplace/plugins/infra/perman-aws-vault
    - caad-develop/claude-code-marketplace/plugins/utils/caad-skill-deployer
    - Jakubantalik/transitions-dev/skills/transitions-dev
    - Lum1104/Understand-Anything/understand-anything-plugin/skills/understand
    - Lum1104/Understand-Anything/understand-anything-plugin/skills/understand-dashboard
    - anthropics/claude-code/plugins/frontend-design/skills/frontend-design
    - browser-use/browser-harness
    - cursor/plugins/cursor-team-kit/skills/thermo-nuclear-code-quality-review
    - emilkowalski/skills/skills/animation-vocabulary
    - emilkowalski/skills/skills/apple-design
    - emilkowalski/skills/skills/emil-design-eng
    - emilkowalski/skills/skills/find-animation-opportunities
    - emilkowalski/skills/skills/improve-animations
    - emilkowalski/skills/skills/review-animations
    - gonta223/humanizer-ja
    - ibelick/ui-skills/skills/baseline-ui
    - ibelick/ui-skills/skills/fixing-accessibility
    - ibelick/ui-skills/skills/fixing-metadata
    - ibelick/ui-skills/skills/fixing-motion-performance
    - mattpocock/skills/skills/engineering/improve-codebase-architecture
    - mattpocock/skills/skills/engineering/resolving-merge-conflicts
    - mattpocock/skills/skills/engineering/wayfinder
    - mattpocock/skills/skills/productivity/grilling
    - mattpocock/skills/skills/productivity/handoff
    - mattpocock/skills/skills/productivity/writing-great-skills
    - millionco/react-doctor/skills/react-doctor
    - modem-dev/hunk/skills/hunk-review
    - git: nextlevelbuilder/ui-ux-pro-max-skill
      skills:
        - ui-ux-pro-max
    - obra/superpowers/skills/brainstorming
    - obra/superpowers/skills/dispatching-parallel-agents
    - obra/superpowers/skills/executing-plans
    - obra/superpowers/skills/finishing-a-development-branch
    - obra/superpowers/skills/subagent-driven-development
    - obra/superpowers/skills/systematic-debugging
    - obra/superpowers/skills/test-driven-development
    - obra/superpowers/skills/using-git-worktrees
    - obra/superpowers/skills/using-superpowers
    - obra/superpowers/skills/verification-before-completion
    - obra/superpowers/skills/writing-plans
    - openai/skills/skills/.curated/gh-address-comments
    - openai/skills/skills/.curated/gh-fix-ci
    - openai/skills/skills/.curated/screenshot
    - vercel-labs/agent-skills/skills/react-best-practices
    - shadcn/improve
    - fujibee/agmsg
  mcp:
    - name: context7
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@upstash/context7-mcp@latest"
    - name: mcp-simple-voicevox
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - "@t09tanaka/mcp-simple-voicevox"
    # Cross-repository public research foundation managed by this APM workspace.
    # This manifest entry is the source of truth; runtime MCP blocks are deployed outputs.
    - name: jina-reader
      registry: false
      transport: streamable-http
      url: https://mcp.jina.ai/v1?include_tags=search,read
      headers:
        Authorization: Bearer ${JINA_API_KEY}
    - name: codex
      registry: false
      transport: stdio
      command: codex
      args:
        - mcp-server
scripts: {}
