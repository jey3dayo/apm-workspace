# ========================================
# Environment
# ========================================
[env]
TASK_EXCLUDES = "--exclude apm.lock.yaml"

# ========================================
# Tools
# ========================================
[tools]
# Runtimes
node = "24"

# CLI tools
fd = "latest"
"github:microsoft/apm" = "v0.9.1"
taplo = "latest"

# npm packages
"npm:prettier" = "latest"
"npm:tsx" = "latest"

# ========================================
# Workspace Commands
# ========================================
[tasks.apply]
description = "Deploy user-scope-compatible APM dependencies and compile Codex output"
run = "bash ./scripts/apm-workspace.sh apply"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 apply"

[tasks.refresh]
description = "Refresh the ~/.apm checkout and dependencies without deploying"
run = "bash ./scripts/apm-workspace.sh refresh"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 refresh"

[tasks.doctor]
description = "Inspect ~/.apm workspace state and deployed targets"
run = "bash ./scripts/apm-workspace.sh doctor"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 doctor"

# ========================================
# Catalog / Skill Commands
# ========================================
[tasks."apply:skills:local"]
description = "Quick-apply managed catalog skills into the local Codex target only"
run = "bash ./scripts/apm-workspace.sh apply:skills:local"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 apply:skills:local"

[tasks."prepare:catalog"]
description = "Normalize `catalog/` in place inside ~/.apm"
run = "bash ./scripts/apm-workspace.sh prepare:catalog"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 prepare:catalog"

[tasks."install:catalog"]
description = "Install the managed catalog package by upstream ref"
run = "bash ./scripts/apm-workspace.sh install:catalog"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 install:catalog"

[tasks."smoke:catalog"]
description = "Smoke-test the generated managed catalog package via a temp install"
run = "bash ./scripts/apm-workspace.sh smoke:catalog"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 smoke:catalog"

# ========================================
# Validation Commands
# ========================================
[tasks."validate:workspace"]
description = "Validate the ~/.apm workspace wiring"
run = "bash ./scripts/apm-workspace.sh validate"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 validate"

[tasks."validate:catalog"]
description = "Fail when the managed catalog package is not normalized or missing required assets"
run = "bash ./scripts/apm-workspace.sh validate:catalog"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 validate:catalog"

[tasks.validate]
description = "Validate the ~/.apm workspace and managed catalog wiring"
depends = ["validate:workspace", "validate:catalog"]

[tasks."apm:install"]
description = "Run user-scope APM install from ~/.apm"
run = "apm install -g"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"apm install -g\""

[tasks."format:markdown"]
description = "Format Markdown files in the ~/.apm workspace"
run = "fd -e md -X prettier --write --log-level error >/dev/null"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"@(fd -e md) | ForEach-Object { prettier --write --log-level error $_ *> $null }\""

[tasks."format:markdown:check"]
description = "Check Markdown formatting in the ~/.apm workspace"
run = "fd -e md -X prettier --check --log-level error"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"@(fd -e md) | ForEach-Object { prettier --check --log-level error $_ }\""

[tasks."format:markdown:bold-headings"]
description = "Rewrite bold headings inside catalog skill and shared guidance sources"
run = "tsx \"$HOME/.config/scripts/replace-bold-headings.ts\" ./catalog"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"tsx \\\"$HOME/.config/scripts/replace-bold-headings.ts\\\" ./catalog\""

[tasks."format:markdown:bold-headings:check"]
description = "Check bold heading rewrites inside catalog skill and shared guidance sources"
run = "tsx \"$HOME/.config/scripts/replace-bold-headings.ts\" ./catalog --dry-run"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"tsx \\\"$HOME/.config/scripts/replace-bold-headings.ts\\\" ./catalog --dry-run\""

[tasks."format:toml"]
description = "Format TOML files in the ~/.apm workspace"
run = "fd -e toml -X env RUST_LOG=taplo=warn taplo format"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"@(fd -e toml) | ForEach-Object { $env:RUST_LOG='taplo=warn'; taplo format $_ }\""

[tasks."format:toml:check"]
description = "Check TOML formatting in the ~/.apm workspace"
run = "fd -e toml -X env RUST_LOG=taplo=warn taplo format --check"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -Command \"@(fd -e toml) | ForEach-Object { $env:RUST_LOG='taplo=warn'; taplo format --check $_ }\""

[tasks."format:yaml"]
description = "Format YAML files in the ~/.apm workspace"
run = "fd -e yml -e yaml ${TASK_EXCLUDES} -X prettier --write --log-level error >/dev/null"
run_windows = """
powershell -NoProfile -ExecutionPolicy Bypass -Command "$taskExcludes = @(); if ($env:TASK_EXCLUDES) { $taskExcludes = @($env:TASK_EXCLUDES -split ' ' | Where-Object { $_ -ne '' }) }; $yamlFiles = @(fd -e yml -e yaml @taskExcludes); if ($yamlFiles.Count -gt 0) { prettier --write --log-level error $yamlFiles *> $null }"
"""

[tasks."format:yaml:check"]
description = "Check YAML formatting in the ~/.apm workspace"
run = "fd -e yml -e yaml ${TASK_EXCLUDES} -X prettier --check --log-level error"
run_windows = """
powershell -NoProfile -ExecutionPolicy Bypass -Command "$taskExcludes = @(); if ($env:TASK_EXCLUDES) { $taskExcludes = @($env:TASK_EXCLUDES -split ' ' | Where-Object { $_ -ne '' }) }; $yamlFiles = @(fd -e yml -e yaml @taskExcludes); if ($yamlFiles.Count -gt 0) { prettier --check --log-level error $yamlFiles }"
"""

[tasks."format:catalog-metadata"]
description = "Normalize tracked catalog metadata files"
run = "bash ./scripts/apm-workspace.sh format-catalog-metadata"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 format-catalog-metadata"

[tasks."format:catalog-metadata:check"]
description = "Check tracked catalog metadata normalization"
run = "bash ./scripts/apm-workspace.sh check-catalog-metadata"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 check-catalog-metadata"

# ========================================
# Aggregation Tasks
# ========================================
[tasks.format]
description = "Format workspace docs and manifests"
run = [
  { task = "format:catalog-metadata" },
  { task = "format:markdown:bold-headings" },
  { task = "format:markdown" },
  { task = "format:toml" },
  { task = "format:yaml" },
]

[tasks."format:check"]
description = "Check workspace docs and manifest formatting"
depends = [
  "format:catalog-metadata:check",
  "format:markdown:bold-headings:check",
  "format:markdown:check",
  "format:toml:check",
  "format:yaml:check",
]

[tasks.check]
description = "Run lightweight pre-deploy checks for the ~/.apm workspace"
depends = ["format:check", "validate"]

[tasks.verify]
description = "Run deep verification for the ~/.apm workspace"
run = [{ task = "check" }, { task = "smoke:catalog" }]

[tasks.deploy]
description = "Run checks, deploy the current workspace state, and inspect targets"
run = [{ task = "check" }, { task = "apply" }, { task = "doctor" }]

# ========================================
# Meta Tasks
# ========================================
[tasks.upgrade]
description = "Refresh upstream APM dependencies, verify, and inspect the ~/.apm workspace"
run = ["apm install -g --update", { task = "deploy" }]

[tasks."refresh:deploy"]
description = "Update, verify, and deploy the ~/.apm workspace locally from the current manifest and lock"
run = [{ task = "refresh" }, { task = "deploy" }]

[tasks."verify:catalog"]
description = "Refresh, validate, and inspect the managed catalog package"
run = [
  { task = "prepare:catalog" },
  { task = "validate:catalog" },
  { task = "doctor" },
]

[tasks."release:catalog"]
description = "Run local sync, require a clean pushed branch, then register the managed catalog"
run = [
  { task = "refresh:deploy" },
  "bash ./scripts/apm-workspace.sh release:catalog",
]
run_windows = [
  { task = "refresh:deploy" },
  "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\apm-workspace.ps1 release:catalog",
]
